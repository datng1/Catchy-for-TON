# fly.toml app configuration file generated for catchy-for-ton on 2026-05-21T07:13:58Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'catchy-for-ton'
primary_region = 'sin'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8787'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
